<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YodaAI — Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./css/styles.css"/>
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-ears">
        <svg viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="14" cy="32" rx="13" ry="7" fill="#2d6639" opacity="0.9"/>
          <path d="M14 32 Q8 10 18 6 Q24 14 27 32" fill="#2d6639" opacity="0.9"/>
          <ellipse cx="66" cy="32" rx="13" ry="7" fill="#2d6639" opacity="0.9"/>
          <path d="M66 32 Q72 10 62 6 Q56 14 53 32" fill="#2d6639" opacity="0.9"/>
          <ellipse cx="40" cy="36" rx="20" ry="13" fill="#1e3a24"/>
        </svg>
      </div>
      <div class="logo-name">YODA<span>AI</span></div>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Nueva conversación
    </button>

    <p class="history-label">Conversaciones</p>
    <div class="history-list" id="historyList"></div>

    <div class="sidebar-footer">
      <div class="force-dot"></div>
      Dagobah Build v1.0
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">

    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <span class="topbar-title">Maestro Yoda · IA</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-box">
        <textarea
          id="userInput"
          rows="1"
          placeholder="Pregunta, joven Padawan…"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">La Fuerza, guiarte puede · Enter para enviar</p>
    </div>

  </div>
</div>

<script src="./js/main.js"></script>
</body>
</html>
